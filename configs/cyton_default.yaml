# OpenBCI Cyton — Layer 1 acquisition configuration
board: cyton

# Serial port for the Cyton USB dongle.
# Set to "auto" to let the driver detect the first matching VID/PID.
serial_port: auto

# BrainFlow sample rate.  500 Hz is required to capture harmonics up to 3×30 Hz.
sample_rate_hz: 500

# Total channels exposed by the board (Cyton = 8).
channel_count: 8

# Electrode labels in Cyton channel order (BrainFlow row 0 = Cyton CH1).
# Cap mapping (example 8-channel montage): np1→CH1 … np8→CH8; SRB → right earlobe.
channel_labels:
  - Oz    # np1 / CH1 — primary occipital (SNR gate uses this row by default)
  - O1    # np2 / CH2
  - O2    # np3 / CH3
  - POz   # np4 / CH4
  - PO3   # np5 / CH5
  - PO4   # np6 / CH6
  - Pz    # np7 / CH7
  - Cz    # np8 / CH8

# Maximum allowed electrode–skin contact impedance in kΩ.
# BCI session is blocked until all active (non-"--") channels meet this threshold.
impedance_max_kohm: 10.0

# LSL stream identifiers — downstream layers discover the stream by name only.
lsl_stream_name: BCI_RawEEG
lsl_stream_type: EEG

# Acquisition loop pull interval in milliseconds.
pull_interval_ms: 10

# How often the acquisition loop logs a health summary (seconds).
log_interval_s: 5
